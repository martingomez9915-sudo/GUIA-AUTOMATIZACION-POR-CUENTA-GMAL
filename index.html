<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MailShield — Guía de Automatización</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Epilogue:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #080c14;
  --bg2: #0d1424;
  --bg3: #111827;
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,0.12);
  --blue-bright: #60a5fa;
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.1);
  --red: #f43f5e;
  --red-dim: rgba(244,63,94,0.1);
  --orange: #f59e0b;
  --orange-dim: rgba(245,158,11,0.1);
  --purple: #8b5cf6;
  --purple-dim: rgba(139,92,246,0.1);
  --cyan: #06b6d4;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
  --border: rgba(59,130,246,0.15);
  --border2: rgba(255,255,255,0.06);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Epilogue', sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::after {
  content:'';
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:9999;
  opacity:0.4;
}

/* SIDEBAR NAV */
.sidebar {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border2);
  padding: 40px 0;
  overflow-y: auto;
  z-index: 100;
}

.sidebar-logo {
  padding: 0 28px 32px;
  border-bottom: 1px solid var(--border2);
  margin-bottom: 24px;
}

.logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--blue-bright);
}

.logo-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
}

.nav-group-label {
  padding: 0 28px 8px;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 28px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: var(--muted2);
  font-size: 13px;
  font-weight: 500;
  position: relative;
}

.nav-item:hover, .nav-item.active {
  color: var(--text);
  background: rgba(59,130,246,0.08);
}

.nav-item.active::before {
  content:'';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--blue);
  border-radius: 0 2px 2px 0;
}

.nav-item .nav-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--blue);
  min-width: 22px;
}

.nav-spacer { height: 20px; }

/* MAIN CONTENT */
.main {
  margin-left: 260px;
  min-height: 100vh;
}

/* TOP BAR */
.topbar {
  position: sticky;
  top: 0;
  background: rgba(8,12,20,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 16px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}

.topbar-title {
  font-size: 13px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.topbar-title span { color: var(--blue-bright); }

.progress-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}

.progress-track {
  width: 160px;
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s ease;
}

/* CONTENT AREA */
.content {
  padding: 60px;
  max-width: 900px;
}

/* HERO BLOCK */
.hero-block {
  margin-bottom: 80px;
  padding-bottom: 60px;
  border-bottom: 1px solid var(--border2);
}

.hero-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--blue);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hero-tag::before {
  content:'';
  width: 20px; height: 1px;
  background: var(--blue);
}

.hero-block h1 {
  font-size: clamp(36px, 5vw, 58px);
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1.05;
  margin-bottom: 20px;
}

.hero-block h1 em {
  font-style: normal;
  color: var(--blue-bright);
}

.hero-desc {
  font-size: 17px;
  color: var(--muted2);
  max-width: 600px;
  line-height: 1.7;
  font-weight: 400;
  margin-bottom: 36px;
}

.hero-stack {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.stack-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid;
  font-weight: 500;
}

.stack-badge.python { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }
.stack-badge.google { color: var(--blue-bright); border-color: rgba(96,165,250,0.3); background: var(--blue-dim); }
.stack-badge.claude { color: var(--purple); border-color: rgba(139,92,246,0.3); background: var(--purple-dim); }
.stack-badge.free { color: var(--green); border-color: rgba(16,185,129,0.3); background: var(--green-dim); }

/* STEP SECTIONS */
.step-section {
  margin-bottom: 72px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s ease;
}

.step-section.visible {
  opacity: 1;
  transform: translateY(0);
}

.step-header {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  margin-bottom: 32px;
}

.step-number-badge {
  flex-shrink: 0;
  width: 52px; height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 700;
}

.step-number-badge.blue { background: var(--blue-dim); color: var(--blue-bright); border: 1px solid rgba(59,130,246,0.25); }
.step-number-badge.green { background: var(--green-dim); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
.step-number-badge.orange { background: var(--orange-dim); color: var(--orange); border: 1px solid rgba(245,158,11,0.25); }
.step-number-badge.purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(139,92,246,0.25); }
.step-number-badge.red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(244,63,94,0.25); }
.step-number-badge.cyan { background: rgba(6,182,212,0.1); color: var(--cyan); border: 1px solid rgba(6,182,212,0.25); }

.step-header-text {}

.step-phase {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.step-header h2 {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.8px;
  line-height: 1.2;
}

.step-desc {
  font-size: 15px;
  color: var(--muted2);
  line-height: 1.7;
  margin-bottom: 28px;
  font-weight: 400;
  max-width: 700px;
}

/* SUBSTEPS */
.substeps {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 28px;
}

.substep {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 20px 22px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  transition: border-color 0.2s;
}

.substep:hover { border-color: var(--border); }

.substep-icon {
  font-size: 20px;
  flex-shrink: 0;
  margin-top: 1px;
}

.substep-content h4 {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
  letter-spacing: -0.2px;
}

.substep-content p {
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.6;
  font-weight: 400;
}

/* CODE BLOCKS */
.code-block {
  background: #0a0e1a;
  border: 1px solid var(--border2);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 24px;
  font-family: 'JetBrains Mono', monospace;
}

.code-header {
  background: #111827;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border2);
}

.code-lang {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.code-filename {
  font-size: 12px;
  color: var(--blue-bright);
}

.code-dots {
  display: flex;
  gap: 6px;
}

.code-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

.code-body {
  padding: 24px;
  font-size: 13px;
  line-height: 1.8;
  overflow-x: auto;
}

.code-comment { color: #4b5563; }
.code-keyword { color: #f472b6; }
.code-string { color: #86efac; }
.code-var { color: #93c5fd; }
.code-func { color: #fbbf24; }
.code-num { color: #fb923c; }
.code-import { color: #a78bfa; }
.code-output { color: var(--green); }
.code-plain { color: #cbd5e1; }

/* INFO BOXES */
.info-box {
  border-radius: 10px;
  padding: 20px 22px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.info-box.tip {
  background: var(--blue-dim);
  border: 1px solid rgba(59,130,246,0.2);
}

.info-box.warning {
  background: var(--orange-dim);
  border: 1px solid rgba(245,158,11,0.2);
}

.info-box.danger {
  background: var(--red-dim);
  border: 1px solid rgba(244,63,94,0.2);
}

.info-box.success {
  background: var(--green-dim);
  border: 1px solid rgba(16,185,129,0.2);
}

.info-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

.info-content h4 {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 4px;
}

.info-content p {
  font-size: 13px;
  line-height: 1.6;
  font-weight: 400;
  opacity: 0.85;
}

.info-box.tip .info-content h4 { color: var(--blue-bright); }
.info-box.warning .info-content h4 { color: var(--orange); }
.info-box.danger .info-content h4 { color: var(--red); }
.info-box.success .info-content h4 { color: var(--green); }

/* CHECKLIST */
.checklist {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  color: var(--muted2);
  padding: 10px 16px;
  background: var(--bg2);
  border-radius: 8px;
  border: 1px solid var(--border2);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}

.check-item:hover { border-color: var(--border); color: var(--text); }
.check-item.done { color: var(--green); border-color: rgba(16,185,129,0.2); background: var(--green-dim); }

.check-box {
  width: 18px; height: 18px;
  border-radius: 4px;
  border: 1.5px solid var(--muted);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all 0.2s;
}

.check-item.done .check-box {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

/* FILE STRUCTURE */
.file-tree {
  background: #0a0e1a;
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 2;
  margin-bottom: 24px;
}

.ft-folder { color: var(--orange); }
.ft-file { color: var(--blue-bright); }
.ft-py { color: #fbbf24; }
.ft-txt { color: var(--muted2); }
.ft-comment { color: var(--muted); }
.ft-indent { padding-left: 20px; }
.ft-indent2 { padding-left: 40px; }

/* DIVIDER */
.step-divider {
  border: none;
  border-top: 1px solid var(--border2);
  margin: 60px 0;
}

/* RESULT PREVIEW */
.result-preview {
  background: #0a0e1a;
  border: 1px solid var(--border2);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 24px;
}

.result-header {
  background: #111827;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border2);
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

.result-body {
  padding: 24px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 2;
}

.r-safe { color: var(--green); }
.r-warn { color: var(--orange); }
.r-danger { color: var(--red); }
.r-muted { color: var(--muted); }
.r-blue { color: var(--blue-bright); }
.r-white { color: var(--text); }

/* FINAL CTA */
.final-cta {
  background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.08));
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: 16px;
  padding: 48px 40px;
  text-align: center;
  margin-top: 60px;
}

.final-cta h2 {
  font-size: 32px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 12px;
}

.final-cta p {
  font-size: 15px;
  color: var(--muted2);
  margin-bottom: 28px;
  font-weight: 400;
}

.cta-btn {
  display: inline-block;
  background: var(--blue);
  color: white;
  padding: 14px 36px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.2s;
  box-shadow: 0 0 30px rgba(59,130,246,0.3);
}

.cta-btn:hover {
  background: var(--blue-bright);
  transform: translateY(-2px);
}

/* TOTAL TIME */
.time-estimate {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  background: var(--bg2);
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border2);
}

/* INLINE CODE */
code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(59,130,246,0.12);
  color: var(--blue-bright);
  padding: 2px 7px;
  border-radius: 4px;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #334155; }

/* ═══ CONFIG PANEL ═══ */
.config-panel {
  background: linear-gradient(135deg, rgba(59,130,246,0.06), rgba(139,92,246,0.06));
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 16px;
  padding: 36px 40px;
  margin-bottom: 72px;
  position: relative;
  overflow: hidden;
}

.config-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--blue), var(--purple), var(--cyan));
}

.config-panel-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
}

.config-panel-icon {
  width: 42px; height: 42px;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.config-panel-title {
  font-size: 20px;
  font-weight: 900;
  letter-spacing: -0.5px;
}

.config-panel-subtitle {
  font-size: 13px;
  color: var(--muted2);
  margin-bottom: 28px;
  font-weight: 400;
  padding-left: 56px;
}

.config-fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

.config-field label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--blue-bright);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
}

.config-field input {
  width: 100%;
  background: rgba(8,12,20,0.8);
  border: 1px solid rgba(59,130,246,0.25);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  outline: none;
  transition: all 0.2s;
}

.config-field input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.config-field input::placeholder {
  color: var(--muted);
}

.config-apply-btn {
  width: 100%;
  padding: 13px;
  border-radius: 8px;
  background: var(--blue);
  color: white;
  font-family: 'Epilogue', sans-serif;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 0 20px rgba(59,130,246,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.config-apply-btn:hover {
  background: var(--blue-bright);
  transform: translateY(-1px);
  box-shadow: 0 0 30px rgba(59,130,246,0.4);
}

.config-status {
  margin-top: 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  text-align: center;
  min-height: 20px;
  transition: all 0.3s;
}

.config-status.ok { color: var(--green); }
.config-status.pending { color: var(--muted); }

/* Highlight for injected values */
.injected-val {
  background: rgba(16,185,129,0.15) !important;
  color: #6ee7b7 !important;
  border-radius: 2px;
  padding: 0 2px;
  transition: background 0.4s;
}

</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">MailShield</div>
    <div class="logo-sub">// guía técnica completa</div>
  </div>

  <div class="nav-group-label">Pasos</div>

  <a href="#paso1" class="nav-item active">
    <span class="nav-num">01</span> Google Cloud Console
  </a>

  </a>
  <a href="#paso3" class="nav-item">
    <span class="nav-num">03</span> Autenticación OAuth
  </a>
  <a href="#paso4" class="nav-item">

  </a>
  <a href="#paso8" class="nav-item">
    <span class="nav-num">08</span> Automatizar mensual
  </a>

  <div class="nav-spacer"></div>
  <div class="nav-group-label">Progreso</div>

  <div style="padding: 0 28px;">
    <div class="progress-bar">
      <div class="progress-track" style="width:100%">
        <div class="progress-fill" id="sidebarProgress"></div>
      </div>
      <span id="progressText">0/8</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">MailShield <span>/</span> Automatización 100 correos</div>
    <div class="progress-bar">
      <span>Progreso:</span>
      <div class="progress-track">
        <div class="progress-fill" id="topProgress"></div>
      </div>
      <span id="topProgressText">0%</span>
    </div>
  </div>

  <!-- CONTENT -->

      <p class="step-desc">
        Este código abre una ventana del navegador donde el usuario aprueba el acceso. Google te da un token que guardas para no pedirlo de nuevo cada mes.

      <div class="code-block">
        <div class="code-header">
          <div class="code-dots">
            <div class="code-dot" style="background:#ff5f57"></div>

        <div class="code-body">
<span class="code-import">import</span> <span class="code-var">os</span>
<span class="code-import">from</span> <span class="code-var">google.oauth2.credentials</span> <span class="code-import">import</span> <span class="code-var">Credentials</span>
<span class="code-import">from</span> <span class="code-var">google_auth_oauthlib.flow</span> <span class="code-import">import</span> <span class="code-var">InstalledAppFlow</span>
<span class="code-import">from</span> <span class="code-var">google.auth.transport.requests</span> <span class="code-import">import</span> <span class="code-var">Request</span>

<span class="code-comment"># Solo pedimos permiso de LECTURA, nunca escribimos ni borramos</span>
<span class="code-var">SCOPES</span> = [<span class="code-string">'https://www.googleapis.com/auth/gmail.readonly'</span>]

<span class="code-keyword">def</span> <span class="code-func">obtener_credenciales</span>():
    <span class="code-var">creds</span> = <span class="code-keyword">None</span>

    <span class="code-comment"># Si ya tenemos un token guardado, lo usamos</span>
    <span class="code-keyword">if</span> <span class="code-func">os.path.exists</span>(<span class="code-string">'token.json'</span>):
        <span class="code-var">creds</span> = <span class="code-var">Credentials</span>.<span class="code-func">from_authorized_user_file</span>(<span class="code-string">'token.json'</span>)

    <span class="code-comment"># Si no hay token o expiró, pedir autorización al usuario</span>
    <span class="code-keyword">if not</span> <span class="code-var">creds</span> <span class="code-keyword">or not</span> <span class="code-var">creds</span>.valid:
        <span class="code-keyword">if</span> <span class="code-var">creds</span> <span class="code-keyword">and</span> <span class="code-var">creds</span>.expired:
            <span class="code-var">creds</span>.<span class="code-func">refresh</span>(<span class="code-var">Request</span>())
        <span class="code-keyword">else</span>:
            <span class="code-comment"># Abre el navegador para que el usuario apruebe</span>
            <span class="code-var">flow</span> = <span class="code-var">InstalledAppFlow</span>.<span class="code-func">from_client_secrets_file</span>(
                <span class="code-string">'credentials.json'</span>, <span class="code-var">SCOPES</span>
            )
            <span class="code-var">creds</span> = <span class="code-var">flow</span>.<span class="code-func">run_local_server</span>(port=<span class="code-num">0</span>)

        <span class="code-comment"># Guardar el token para la próxima vez (no pedir permiso de nuevo)</span>
        <span class="code-keyword">with</span> <span class="code-func">open</span>(<span class="code-string">'token.json'</span>, <span class="code-string">'w'</span>) <span class="code-keyword">as</span> <span class="code-var">t</span>:
            <span class="code-var">t</span>.<span class="code-func">write</span>(<span class="code-var">creds</span>.<span class="code-func">to_json</span>())

    <span class="code-keyword">return</span> <span class="code-var">creds</span>
        </div>
      </div>

      <p class="step-desc">
        Con el token ya aprobado, descargamos los últimos 100 correos. Extraemos asunto, remitente y el cuerpo del texto. No guardamos los correos en disco, solo los analizamos en memoria.

      <div class="code-block">
        <div class="code-header">
          <div class="code-dots">
            <div class="code-dot" style="background:#ff5f57"></div>
            <div class="code-dot" style="background:#ffbd2e"></div>

        <div class="code-body">
<span class="code-import">import</span> <span class="code-var">base64</span>
<span class="code-import">from</span> <span class="code-var">googleapiclient.discovery</span> <span class="code-import">import</span> <span class="code-func">build</span>
<span class="code-import">from</span> <span class="code-var">auth</span> <span class="code-import">import</span> <span class="code-func">obtener_credenciales</span>

<span class="code-keyword">def</span> <span class="code-func">descargar_correos</span>(cantidad=<span class="code-num">100</span>):
    <span class="code-var">creds</span> = <span class="code-func">obtener_credenciales</span>()
    <span class="code-var">servicio</span> = <span class="code-func">build</span>(<span class="code-string">'gmail'</span>, <span class="code-string">'v1'</span>, credentials=<span class="code-var">creds</span>)

    <span class="code-keyword">print</span>(<span class="code-string">f"→ Descargando {cantidad} correos..."</span>)

    <span class="code-comment"># Obtener lista de IDs de los últimos 100 correos</span>
    <span class="code-var">resultado</span> = <span class="code-var">servicio</span>.users().messages().<span class="code-func">list</span>(
        userId=<span class="code-string">'me'</span>,
        maxResults=<span class="code-var">cantidad</span>
    ).<span class="code-func">execute</span>()

    <span class="code-var">mensajes</span> = <span class="code-var">resultado</span>.get(<span class="code-string">'messages'</span>, [])
    <span class="code-var">correos</span> = []

    <span class="code-keyword">for</span> <span class="code-var">i</span>, <span class="code-var">msg</span> <span class="code-keyword">in</span> <span class="code-func">enumerate</span>(<span class="code-var">mensajes</span>):
        <span class="code-keyword">print</span>(<span class="code-string">f"  [{i+1}/{cantidad}] Procesando..."</span>, end=<span class="code-string">'\r'</span>)

        <span class="code-comment"># Descargar el correo completo</span>
        <span class="code-var">correo</span> = <span class="code-var">servicio</span>.users().messages().<span class="code-func">get</span>(
            userId=<span class="code-string">'me'</span>,
            id=<span class="code-var">msg</span>[<span class="code-string">'id'</span>],
            format=<span class="code-string">'full'</span>
        ).<span class="code-func">execute</span>()

        <span class="code-comment"># Extraer datos del encabezado</span>
        <span class="code-var">headers</span> = <span class="code-var">correo</span>[<span class="code-string">'payload'</span>][<span class="code-string">'headers'</span>]
        <span class="code-var">asunto</span> = <span class="code-func">next</span>((<span class="code-var">h</span>[<span class="code-string">'value'</span>] <span class="code-keyword">for</span> <span class="code-var">h</span> <span class="code-keyword">in</span> <span class="code-var">headers</span> <span class="code-keyword">if</span> <span class="code-var">h</span>[<span class="code-string">'name'</span>] == <span class="code-string">'Subject'</span>), <span class="code-string">'Sin asunto'</span>)
        <span class="code-var">remitente</span> = <span class="code-func">next</span>((<span class="code-var">h</span>[<span class="code-string">'value'</span>] <span class="code-keyword">for</span> <span class="code-var">h</span> <span class="code-keyword">in</span> <span class="code-var">headers</span> <span class="code-keyword">if</span> <span class="code-var">h</span>[<span class="code-string">'name'</span>] == <span class="code-string">'From'</span>), <span class="code-string">'Desconocido'</span>)

        <span class="code-comment"># Extraer cuerpo del correo (texto plano)</span>
        <span class="code-var">cuerpo</span> = <span class="code-func">extraer_cuerpo</span>(<span class="code-var">correo</span>[<span class="code-string">'payload'</span>])

        <span class="code-var">correos</span>.<span class="code-func">append</span>({
            <span class="code-string">'id'</span>: <span class="code-var">msg</span>[<span class="code-string">'id'</span>],
            <span class="code-string">'asunto'</span>: <span class="code-var">asunto</span>,
            <span class="code-string">'remitente'</span>: <span class="code-var">remitente</span>,
            <span class="code-string">'cuerpo'</span>: <span class="code-var">cuerpo</span>[:<span class="code-num">2000</span>]  <span class="code-comment"># Máximo 2000 chars para no gastar tokens</span>
        })

    <span class="code-keyword">print</span>(<span class="code-string">f"\n✓ {len(correos)} correos descargados"</span>)
    <span class="code-keyword">return</span> <span class="code-var">correos</span>

<span class="code-keyword">def</span> <span class="code-func">extraer_cuerpo</span>(<span class="code-var">payload</span>):
    <span class="code-comment"># Si el correo tiene partes (HTML + texto), tomamos el texto</span>
    <span class="code-keyword">if</span> <span class="code-string">'parts'</span> <span class="code-keyword">in</span> <span class="code-var">payload</span>:
        <span class="code-keyword">for</span> <span class="code-var">part</span> <span class="code-keyword">in</span> <span class="code-var">payload</span>[<span class="code-string">'parts'</span>]:
            <span class="code-keyword">if</span> <span class="code-var">part</span>[<span class="code-string">'mimeType'</span>] == <span class="code-string">'text/plain'</span>:
                <span class="code-var">data</span> = <span class="code-var">part</span>[<span class="code-string">'body'</span>].get(<span class="code-string">'data'</span>, <span class="code-string">''</span>)
                <span class="code-keyword">return</span> <span class="code-var">base64</span>.<span class="code-func">urlsafe_b64decode</span>(<span class="code-var">data</span>).<span class="code-func">decode</span>(<span class="code-string">'utf-8'</span>, errors=<span class="code-string">'ignore'</span>)
    <span class="code-keyword">elif</span> <span class="code-string">'body'</span> <span class="code-keyword">in</span> <span class="code-var">payload</span>:
        <span class="code-var">data</span> = <span class="code-var">payload</span>[<span class="code-string">'body'</span>].get(<span class="code-string">'data'</span>, <span class="code-string">''</span>)
        <span class="code-keyword">return</span> <span class="code-var">base64</span>.<span class="code-func">urlsafe_b64decode</span>(<span class="code-var">data</span>).<span class="code-func">decode</span>(<span class="code-string">'utf-8'</span>, errors=<span class="code-string">'ignore'</span>)
    <span class="code-keyword">return</span> <span class="code-string">''</span>
        </div>
      </div>

      <p class="step-desc">
        Este es el corazón del producto. Cada correo se envía a Claude con un prompt específico. Claude devuelve un score del 0 al 100 y una explicación del riesgo detectado.
      </p>

      <div class="code-block">
        <div class="code-header">
          <div class="code-dots">
            <div class="code-dot" style="background:#ff5f57"></div>
            <div class="code-dot" style="background:#ffbd2e"></div>

        <div class="code-body">
<span class="code-import">import</span> <span class="code-var">anthropic</span>
<span class="code-import">import</span> <span class="code-var">json</span>
<span class="code-import">import</span> <span class="code-var">os</span>
<span class="code-import">from</span> <span class="code-var">dotenv</span> <span class="code-import">import</span> <span class="code-func">load_dotenv</span>

<span class="code-func">load_dotenv</span>()
<span class="code-var">cliente</span> = <span class="code-var">anthropic</span>.<span class="code-func">Anthropic</span>(api_key=<span class="code-string" data-slot="apikey">"sk-ant-api03-TU-CLAVE-AQUI"</span>)

<span class="code-keyword">def</span> <span class="code-func">analizar_correo</span>(<span class="code-var">correo</span>):
    <span class="code-var">prompt</span> = <span class="code-string">f"""Analiza este correo electrónico y determina si es seguro, sospechoso o peligroso.

ASUNTO: {correo['asunto']}
REMITENTE: {correo['remitente']}
CONTENIDO: {correo['cuerpo'][:1500]}

Responde SOLO con un JSON válido con esta estructura exacta:
{{
  "score": (número del 0 al 100, donde 0=totalmente seguro, 100=peligro extremo),
  "nivel": ("SEGURO" o "SOSPECHOSO" o "PELIGROSO"),
  "razon": "Explicación breve en español de por qué tiene ese score",
  "tipo_amenaza": "phishing/fraude/spam/malware/legitimo"
}}"""</span>

    <span class="code-var">respuesta</span> = <span class="code-var">cliente</span>.messages.<span class="code-func">create</span>(
        model=<span class="code-string">"claude-haiku-4-5-20251001"</span>,  <span class="code-comment"># Haiku es más barato para volumen alto</span>
        max_tokens=<span class="code-num">300</span>,
        messages=[{<span class="code-string">"role"</span>: <span class="code-string">"user"</span>, <span class="code-string">"content"</span>: <span class="code-var">prompt</span>}]
    )

    <span class="code-comment"># Parsear la respuesta JSON de Claude</span>
    <span class="code-var">texto</span> = <span class="code-var">respuesta</span>.content[<span class="code-num">0</span>].text.<span class="code-func">strip</span>()
    <span class="code-var">resultado</span> = <span class="code-var">json</span>.<span class="code-func">loads</span>(<span class="code-var">texto</span>)
    <span class="code-var">resultado</span>[<span class="code-string">'asunto'</span>] = <span class="code-var">correo</span>[<span class="code-string">'asunto'</span>]
    <span class="code-var">resultado</span>[<span class="code-string">'remitente'</span>] = <span class="code-var">correo</span>[<span class="code-string">'remitente'</span>]
    <span class="code-keyword">return</span> <span class="code-var">resultado</span>

<span class="code-keyword">def</span> <span class="code-func">analizar_todos</span>(<span class="code-var">correos</span>):
    <span class="code-var">resultados</span> = []
    <span class="code-keyword">for</span> <span class="code-var">i</span>, <span class="code-var">correo</span> <span class="code-keyword">in</span> <span class="code-func">enumerate</span>(<span class="code-var">correos</span>):
        <span class="code-keyword">print</span>(<span class="code-string">f"🤖 Analizando {i+1}/{len(correos)}: {correo['asunto'][:50]}..."</span>)
        <span class="code-keyword">try</span>:
            <span class="code-var">r</span> = <span class="code-func">analizar_correo</span>(<span class="code-var">correo</span>)
            <span class="code-var">resultados</span>.<span class="code-func">append</span>(<span class="code-var">r</span>)
            <span class="code-comment"># Icono según nivel</span>
            <span class="code-var">icono</span> = {<span class="code-string">"SEGURO"</span>:<span class="code-string">"✓"</span>, <span class="code-string">"SOSPECHOSO"</span>:<span class="code-string">"⚠"</span>, <span class="code-string">"PELIGROSO"</span>:<span class="code-string">"🚨"</span>}.get(<span class="code-var">r</span>[<span class="code-string">'nivel'</span>], <span class="code-string">"?"</span>)
            <span class="code-keyword">print</span>(<span class="code-string">f"  {icono} {r['nivel']} (score: {r['score']})"</span>)
        <span class="code-keyword">except</span> <span class="code-var">Exception</span> <span class="code-keyword">as</span> <span class="code-var">e</span>:
            <span class="code-keyword">print</span>(<span class="code-string">f"  ✗ Error: {e}"</span>)
    <span class="code-keyword">return</span> <span class="code-var">resultados</span>
        </div>
      </div>

      <div class="info-box tip">
        <span class="info-icon">💡</span>
        <div class="info-content">
          <h4>¿Por qué usamos claude-haiku y no claude-sonnet?</h4>
          <p>Haiku es 10x más barato y más que suficiente para analizar correos. Para 100 correos el costo total es aprox. $0.30 USD. Sonnet lo reservamos para análisis complejos de adjuntos.</p>

    &lt;body&gt;
      &lt;h1&gt;🛡️ Informe MailShield — {mes}&lt;/h1&gt;

      &lt;div class="resumen"&gt;

    <span class="code-keyword">with</span> <span class="code-func">open</span>(<span class="code-string">f'informe_{mes}.html'</span>, <span class="code-string">'w'</span>) <span class="code-keyword">as</span> <span class="code-var">f</span>:

      <div class="code-block">

<span class="code-import">import</span> <span class="code-var">smtplib</span>
<span class="code-import">from</span> <span class="code-var">email.mime.multipart</span> <span class="code-import">import</span> <span class="code-var">MIMEMultipart</span>
<span class="code-import">from</span> <span class="code-var">email.mime.text</span> <span class="code-import">import</span> <span class="code-var">MIMEText</span>
<span class="code-import">import</span> <span class="code-var">os</span>

<span class="code-keyword">def</span> <span class="code-func">enviar_informe</span>(<span class="code-var">html_informe</span>, <span class="code-var">email_destino</span>, <span class="code-var">mes</span>):
    <span class="code-var">EMAIL_ORIGEN</span>  = <span class="code-var">os</span>.<span class="code-func">getenv</span>(<span class="code-string">'EMAIL_ORIGEN'</span>)   <span class="code-comment"># Tu Gmail</span>
    <span class="code-var">EMAIL_CLAVE</span>   = <span class="code-var">os</span>.<span class="code-func">getenv</span>(<span class="code-string">'GMAIL_APP_PASSWORD'</span>) <span class="code-comment"># Contraseña de aplicación</span>

    <span class="code-var">mensaje</span> = <span class="code-var">MIMEMultipart</span>(<span class="code-string">'alternative'</span>)
    <span class="code-var">mensaje</span>[<span class="code-string">'Subject'</span>] = <span class="code-string">f"🛡️ Tu Informe MailShield — {mes}"</span>
    <span class="code-var">mensaje</span>[<span class="code-string">'From'</span>]    = <span class="code-var">EMAIL_ORIGEN</span>
    <span class="code-var">mensaje</span>[<span class="code-string">'To'</span>]      = <span class="code-string" data-slot="email">tucorreo@gmail.com</span>

    <span class="code-comment"># Adjuntar el HTML del informe</span>
    <span class="code-var">parte_html</span> = <span class="code-var">MIMEText</span>(<span class="code-var">html_informe</span>, <span class="code-string">'html'</span>)
    <span class="code-var">mensaje</span>.<span class="code-func">attach</span>(<span class="code-var">parte_html</span>)

    <span class="code-comment"># Enviar via Gmail SMTP</span>
    <span class="code-keyword">with</span> <span class="code-var">smtplib</span>.<span class="code-func">SMTP_SSL</span>(<span class="code-string">'smtp.gmail.com'</span>, <span class="code-num">465</span>) <span class="code-keyword">as</span> <span class="code-var">servidor</span>:
        <span class="code-var">servidor</span>.<span class="code-func">login</span>(<span class="code-var">EMAIL_ORIGEN</span>, <span class="code-var">EMAIL_CLAVE</span>)
        <span class="code-var">servidor</span>.<span class="code-func">sendmail</span>(<span class="code-var">EMAIL_ORIGEN</span>, <span class="code-var">email_destino</span>, <span class="code-var">mensaje</span>.<span class="code-func">as_string</span>())

    <span class="code-keyword">print</span>(<span class="code-string">f"✓ Informe enviado a {email_destino}"</span>)

    <span class="code-var">mes</span> = <span class="code-var">datetime</span>.<span class="code-func">now</span>().<span class="code-func">strftime</span>(<span class="code-string">"%B_%Y"</span>)

<span class="code-comment"># Ejecutar</span>
<span class="code-keyword">if</span> <span class="code-var">__name__</span> == <span class="code-string">'__main__'</span>:

          <span class="code-lang">bash</span>

<script>
  // ════════════════════════════════════════════
  // CONFIG INJECTION — inserta API key y email
  // en todos los bloques marcados con data-slot
  // ════════════════════════════════════════════
  function aplicarConfig() {
    const apiKey = document.getElementById('inputApiKey').value.trim();
    const email  = document.getElementById('inputEmail').value.trim();
    const status = document.getElementById('configStatus');

    if (!apiKey && !email) {
      status.textContent = '⚠ Ingresa al menos uno de los dos valores.';
      status.className = 'config-status';
      status.style.color = 'var(--orange)';
      return;
    }

    let count = 0;

    // Reemplaza todos los elementos con data-slot="apikey"
    if (apiKey) {
      document.querySelectorAll('[data-slot="apikey"]').forEach(el => {
        el.textContent = apiKey;
        el.classList.add('injected-val');
        count++;
      });
    }

    // Reemplaza todos los elementos con data-slot="email"
    if (email) {
      document.querySelectorAll('[data-slot="email"]').forEach(el => {
        el.textContent = email;
        el.classList.add('injected-val');
        count++;
      });
    }

    // Feedback
    status.textContent = `✓ Configuración aplicada en ${count} lugar${count !== 1 ? 'es' : ''} del código.`;
    status.className = 'config-status ok';

    // Quitar highlight después de 4 segundos
    setTimeout(() => {
      document.querySelectorAll('.injected-val').forEach(el => el.classList.remove('injected-val'));
    }, 4000);
  }

  // Aplicar también con Enter
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (
      document.activeElement.id === 'inputApiKey' ||
      document.activeElement.id === 'inputEmail'
    )) aplicarConfig();
  });

  // ════════════════════════════════════════════
  // SCROLL SPY — resalta paso activo en sidebar
  // ════════════════════════════════════════════
  const sections = document.querySelectorAll('.step-section');
  const navItems = document.querySelectorAll('.nav-item');

  const spy = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navItems.forEach(n => n.classList.remove('active'));
        const active = document.querySelector(`.nav-item[href="#${e.target.id}"]`);
        if (active) active.classList.add('active');
      }
    });
  }, { threshold: 0.3 });

  sections.forEach(s => spy.observe(s));

  // ════════════════════════════════════════════
  // REVEAL ON SCROLL
  // ════════════════════════════════════════════
  const revealObs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.1 });

  sections.forEach(s => revealObs.observe(s));

  // ════════════════════════════════════════════
  // CHECKLIST INTERACTIVO + BARRA DE PROGRESO
  // ════════════════════════════════════════════
  let totalChecks = 0;

  function countChecks() {
    totalChecks = document.querySelectorAll('.check-item').length;
  }

  function toggleCheck(el) {
    el.classList.toggle('done');
    el.querySelector('.check-box').textContent = el.classList.contains('done') ? '✓' : '';
    updateProgress();
  }

  function updateProgress() {
    const done = document.querySelectorAll('.check-item.done').length;
    const pct = totalChecks > 0 ? Math.round((done / totalChecks) * 100) : 0;

    document.querySelectorAll('.progress-fill').forEach(f => f.style.width = pct + '%');
    document.getElementById('topProgressText').textContent = pct + '%';

    const stepsWithAllDone = Array.from(document.querySelectorAll('.step-section')).filter(s => {
      const checks = s.querySelectorAll('.check-item');
      if (checks.length === 0) return false;
      return Array.from(checks).every(c => c.classList.contains('done'));
    }).length;

    document.getElementById('progressText').textContent = `${stepsWithAllDone}/8`;
    document.getElementById('sidebarProgress').style.width = (stepsWithAllDone / 8 * 100) + '%';
  }

  countChecks();
</script>
